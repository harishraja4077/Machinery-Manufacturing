<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found | Stackly Industries</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--dark);
      position: relative;
      overflow: hidden;
    }

    .error-page::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 800px;
      height: 800px;
      background: radial-gradient(circle, rgba(230,57,70,0.06), transparent 60%);
      pointer-events: none;
      animation: pulseGlowBg 6s ease-in-out infinite;
    }

    @keyframes pulseGlowBg {
      0%, 100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 0.6; transform: translate(-50%, -50%) scale(1.1); }
    }

    .error-grid-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image:
        linear-gradient(rgba(230,57,70,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(230,57,70,0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
    }

    .error-nav {
      padding: 20px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      z-index: 10;
    }

    .error-nav .logo {
      display: flex;
      align-items: center;
      text-decoration: none;
    }

    .error-nav .logo img {
      height: 98px;
      width: auto;
    }

    .error-nav a {
      color: var(--text-dim);
      text-decoration: none;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      font-weight: 500;
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .error-nav a:hover {
      color: var(--primary);
    }

    .error-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 30px;
      position: relative;
      z-index: 10;
      text-align: center;
    }

    /* Animated Gear Icon */
    .error-gear-wrapper {
      position: relative;
      width: 140px;
      height: 140px;
      margin-bottom: 40px;
    }

    .error-gear {
      width: 140px;
      height: 140px;
      position: relative;
      animation: spinSlow 12s linear infinite;
    }

    .error-gear svg {
      width: 100%;
      height: 100%;
    }

    .error-gear-inner {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 50px;
      height: 50px;
      background: var(--gradient-1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: spinSlow 12s linear infinite reverse;
      box-shadow: 0 0 30px rgba(230,57,70,0.4);
    }

    .error-gear-inner span {
      font-family: 'Orbitron', sans-serif;
      font-size: 18px;
      font-weight: 900;
      color: #fff;
    }

    @keyframes spinSlow {
      to { transform: rotate(360deg); }
    }

    .error-gear-inner {
      animation: counterSpin 12s linear infinite;
    }

    @keyframes counterSpin {
      to { transform: translate(-50%, -50%) rotate(-360deg); }
    }

    .error-code {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(100px, 18vw, 200px);
      font-weight: 900;
      line-height: 1;
      margin-bottom: 8px;
      background: linear-gradient(135deg, rgba(230,57,70,0.15), rgba(247,127,0,0.1));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      user-select: none;
      position: relative;
    }

    .error-code-overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(100px, 18vw, 200px);
      font-weight: 900;
      line-height: 1;
      background: var(--gradient-1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      opacity: 0.7;
      animation: glitchText 4s ease-in-out infinite;
    }

    @keyframes glitchText {
      0%, 92%, 100% { transform: translate(-50%, -50%); opacity: 0.7; }
      93% { transform: translate(calc(-50% + 4px), calc(-50% - 2px)); opacity: 0.9; }
      94% { transform: translate(calc(-50% - 3px), calc(-50% + 3px)); opacity: 0.5; }
      95% { transform: translate(calc(-50% + 2px), calc(-50% + 1px)); opacity: 0.8; }
      96% { transform: translate(-50%, -50%); opacity: 0.7; }
    }

    .error-title {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(24px, 3vw, 36px);
      font-weight: 700;
      color: #fff;
      margin-bottom: 16px;
    }

    .error-desc {
      font-size: 17px;
      color: var(--text-dim);
      max-width: 520px;
      line-height: 1.7;
      margin-bottom: 40px;
    }

    .error-buttons {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 60px;
    }

    /* Search Bar */
    .error-search {
      display: flex;
      align-items: center;
      gap: 0;
      max-width: 460px;
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      overflow: hidden;
      transition: var(--transition);
      margin-bottom: 50px;
    }

    .error-search:focus-within {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(230,57,70,0.1);
    }

    .error-search input {
      flex: 1;
      padding: 16px 20px;
      background: transparent;
      border: none;
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      font-size: 15px;
      outline: none;
    }

    .error-search input::placeholder {
      color: var(--text-dim);
    }

    .error-search button {
      padding: 16px 24px;
      background: var(--gradient-1);
      border: none;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .error-search button:hover {
      filter: brightness(1.15);
    }

    /* Quick Links */
    .error-quick {
      text-align: center;
      max-width: 700px;
    }

    .error-quick h4 {
      font-family: 'Orbitron', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 20px;
    }

    .error-quick-links {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .error-quick-links a {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px;
      color: var(--text);
      text-decoration: none;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      font-weight: 500;
      transition: var(--transition);
    }

    .error-quick-links a:hover {
      border-color: rgba(230,57,70,0.3);
      background: rgba(230,57,70,0.06);
      color: var(--primary);
      transform: translateY(-2px);
    }

    .error-quick-links a .ql-icon {
      font-size: 16px;
    }

    /* Floating Broken Parts */
    .broken-parts {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
    }

    .broken-part {
      position: absolute;
      font-size: 30px;
      opacity: 0.06;
      animation: floatBroken linear infinite;
    }

    @keyframes floatBroken {
      0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
      10% { opacity: 0.06; }
      90% { opacity: 0.06; }
      100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
    }

    /* Footer mini */
    .error-footer {
      padding: 20px 40px;
      border-top: 1px solid rgba(255,255,255,0.05);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      z-index: 10;
    }

    .error-footer p {
      font-size: 13px;
      color: var(--text-dim);
    }

    .error-footer-links {
      display: flex;
      gap: 20px;
    }

    .error-footer-links a {
      color: var(--text-dim);
      text-decoration: none;
      font-size: 13px;
      transition: var(--transition);
    }

    .error-footer-links a:hover {
      color: var(--primary);
    }

    @media (max-width: 600px) {
      .error-nav { padding: 16px 20px; }
      .error-footer { flex-direction: column; gap: 12px; text-align: center; }
      .error-quick-links { flex-direction: column; align-items: center; }
      .error-buttons { flex-direction: column; align-items: center; }
      .error-gear-wrapper { width: 100px; height: 100px; }
      .error-gear { width: 100px; height: 100px; }
      .error-gear-inner { width: 36px; height: 36px; }
      .error-gear-inner span { font-size: 14px; }
    }
  </style>
</head>
<body>

  <div class="preloader"><div class="preloader-gear"></div></div>
  <div class="particles-container"></div>

  <!-- Floating Broken Parts Background -->
  <div class="broken-parts" id="brokenParts"></div>

  <div class="error-page">
    <div class="error-grid-bg"></div>

    <!-- NAV -->
    <nav class="error-nav reveal">
      <a href="index.html" class="logo">
        <img src="images/logo.webp" alt="Stackly Logo">
      </a>
      <a href="index.html">Back to Home</a>
    </nav>

    <!-- CONTENT -->
    <div class="error-content">
      <!-- Animated Gear -->
      <div class="error-gear-wrapper reveal-scale">
        <div class="error-gear">
          <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M50 10 L55 10 L57 18 C59 18.5 61 19.5 63 20.5 L70 14 L74 17 L68 25 C69 27 70 29 70.5 31 L79 29 L80 34 L72 38 C72 40 72 42 72 44 L80 46 L79 51 L71 49 C70 51 69 53 68 55 L75 62 L72 66 L64 60 C62 61 60 62 58 62.5 L60 71 L55 72 L50 64 C48 64.5 46 64.5 44 64 L40 72 L35 71 L37 62.5 C35 62 33 61 31 60 L23 66 L20 62 L27 55 C26 53 25 51 24 49 L16 51 L15 46 L23 44 C23 42 23 40 23 38 L15 34 L16 29 L24 31 C24.5 29 25.5 27 26.5 25 L20 17 L24 14 L31 20.5 C33 19.5 35 18.5 37 18 L39 10 L44 10 Z" stroke="rgba(230,57,70,0.25)" stroke-width="1.5" fill="rgba(230,57,70,0.04)"/>
            <circle cx="50" cy="41" r="12" stroke="rgba(230,57,70,0.3)" stroke-width="1.5" fill="none"/>
          </svg>
          <div class="error-gear-inner">
            <span>!</span>
          </div>
        </div>
      </div>

      <!-- 404 Text -->
      <div style="position:relative;display:inline-block;">
        <div class="error-code reveal">404</div>
        <div class="error-code-overlay reveal" style="position:absolute;top:0;left:50%;transform:translateX(-50%);">404</div>
      </div>

      <h1 class="error-title reveal">Page Not Found</h1>
      <p class="error-desc reveal">The page you're looking for doesn't exist, has been moved, or is temporarily unavailable. Let us help you get back on track.</p>

  

      <!-- Buttons -->
      <div class="error-buttons reveal">
        <a href="index.html" class="btn btn-primary magnetic-btn">Go to Homepage</a>
        <a href="contact.html" class="btn btn-outline magnetic-btn">Contact Support</a>
      </div>

      
    </div>

    <!-- FOOTER -->
    <footer class="error-footer reveal">
      <p>&copy; 2026 Stackly Industries. All rights reserved.</p>
      <div class="error-footer-links">
        <a href="#">Privacy Policy</a>
        <a href="#">Terms of Service</a>
        <a href="index.html">Home</a>
      </div>
    </footer>
  </div>

  <script src="js/icons.js"></script>
  <script src="js/script.js"></script>
  <script>
    // Floating broken parts
    const container = document.getElementById('brokenParts');
    const parts = ['⚙', '✂', '🔧', '🛠', '⚗', '⚡', '🔨', '⚖'];
    if (container) {
      for (let i = 0; i < 15; i++) {
        const part = document.createElement('div');
        part.classList.add('broken-part');
        part.innerHTML = parts[Math.floor(Math.random() * parts.length)];
        part.style.left = Math.random() * 100 + '%';
        part.style.fontSize = (Math.random() * 30 + 20) + 'px';
        part.style.animationDuration = (Math.random() * 20 + 15) + 's';
        part.style.animationDelay = (Math.random() * 15) + 's';
        container.appendChild(part);
      }
    }

    // Search handler
    function handleErrorSearch() {
      const val = document.getElementById('errorSearch')?.value.trim();
      if (val) {
        window.location.href = 'index.html';
      }
    }
    document.getElementById('errorSearch')?.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') handleErrorSearch();
    });
  </script>
</body>
</html>
